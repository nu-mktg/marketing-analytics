<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Loading…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Marked.js for Markdown → HTML -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<!-- MathJax for LaTeX rendering -->
<script>
  window.MathJax = {
    tex: {
      inlineMath:  [['$', '$']],
      displayMath: [['$$', '$$']],
      processEscapes: true
    },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
    startup: { typeset: false }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
:root {
  --ink:   #1a1a1a;
  --ink2:  #444;
  --ink3:  #888;
  --paper: #fafaf7;
  --rule:  #e0ddd6;
  --accent:#c0392b;
  --mono-bg:#f0ede8;
  --code-bg:#f5f2ee;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-weight: 300;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}
.topbar {
  background: var(--ink);
  color: white;
  padding: 0.6rem 2rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  font-size: 0.78rem;
  font-family: 'IBM Plex Mono', monospace;
}
.topbar a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  transition: color 0.12s;
}
.topbar a:hover { color: white; }
.topbar .sep { color: rgba(255,255,255,0.2); }
#filename { color: rgba(255,255,255,0.85); }

.page { max-width: 740px; margin: 0 auto; padding: 3rem 2rem 6rem; }

/* Loading / error states */
#loading, #error {
  text-align: center;
  padding: 4rem 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  color: var(--ink3);
}
#error { color: var(--accent); }
#content { display: none; }

/* ── Markdown rendered styles ── */
#content h1 {
  font-family: 'Lora', Georgia, serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
  padding-bottom: 0.75rem;
  border-bottom: 2px solid var(--ink);
}
#content h2 {
  font-family: 'Lora', Georgia, serif;
  font-size: 1.35rem;
  font-weight: 600;
  margin-top: 2.5rem;
  margin-bottom: 0.75rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--rule);
}
#content h3 {
  font-size: 1rem;
  font-weight: 500;
  margin-top: 2rem;
  margin-bottom: 0.5rem;
  color: var(--ink);
}
#content h4 {
  font-size: 0.9rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink3);
  margin-top: 1.5rem;
  margin-bottom: 0.4rem;
}
#content p { margin-bottom: 1rem; }
#content strong { font-weight: 500; }
#content em { font-family: 'Lora', serif; font-style: italic; }

#content ul, #content ol {
  margin: 0.5rem 0 1rem 1.4rem;
}
#content li { margin-bottom: 0.3rem; }

#content code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.84em;
  background: var(--mono-bg);
  padding: 0.1em 0.4em;
  border-radius: 2px;
}
#content pre {
  background: var(--code-bg);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  padding: 1rem 1.2rem;
  overflow-x: auto;
  margin: 1rem 0 1.5rem;
  border-radius: 0 2px 2px 0;
}
#content pre code {
  background: none;
  padding: 0;
  font-size: 0.83em;
  line-height: 1.55;
}

#content blockquote {
  border-left: 3px solid var(--rule);
  padding-left: 1.2rem;
  color: var(--ink2);
  margin: 1rem 0;
  font-style: italic;
}

#content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.2rem 0 1.5rem;
  font-size: 0.875rem;
}
#content th {
  text-align: left;
  font-weight: 500;
  border-bottom: 2px solid var(--ink);
  padding: 0.4rem 0.8rem 0.4rem 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink3);
}
#content td {
  padding: 0.45rem 0.8rem 0.45rem 0;
  border-bottom: 1px solid var(--rule);
  vertical-align: top;
}
#content tr:last-child td { border-bottom: none; }

#content hr {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 2.5rem 0;
}

/* Display math block spacing */
.MathJax-Display, mjx-container[display="true"] {
  margin: 1.2rem 0 !important;
  overflow-x: auto;
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">← Course Home</a>
  <span class="sep">|</span>
  <span id="filename">Loading…</span>
</div>

<div class="page">
  <div id="loading">Loading…</div>
  <div id="error" style="display:none"></div>
  <div id="content"></div>
</div>

<script>
(async () => {
  const params   = new URLSearchParams(window.location.search);
  const file     = params.get('file');
  const loading  = document.getElementById('loading');
  const errorDiv = document.getElementById('error');
  const content  = document.getElementById('content');
  const filenameEl = document.getElementById('filename');

  if (!file) {
    loading.style.display = 'none';
    errorDiv.style.display = 'block';
    errorDiv.textContent = 'No file specified. Add ?file=path/to/file.md to the URL.';
    return;
  }

  filenameEl.textContent = file.split('/').pop();
  document.title = file.split('/').pop().replace('.md', '');

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const md = await resp.text();

    // Stash math blocks before Marked processes them (Marked can mangle LaTeX)
    const mathBlocks = [];
    const placeholder = (i) => `MATHPLACEHOLDER${i}ENDMATH`;

    let safe = md
      // Display math $$ ... $$ (possibly multiline)
      .replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
        mathBlocks.push({ type: 'display', expr });
        return placeholder(mathBlocks.length - 1);
      })
      // Inline math $ ... $ (not $$ — already handled above)
      .replace(/\$([^\n$]+?)\$/g, (_, expr) => {
        mathBlocks.push({ type: 'inline', expr });
        return placeholder(mathBlocks.length - 1);
      });

    // Parse markdown
    let html = marked.parse(safe);

    // Restore math blocks as MathJax delimiters
    html = html.replace(/MATHPLACEHOLDER(\d+)ENDMATH/g, (_, i) => {
      const { type, expr } = mathBlocks[parseInt(i)];
      return type === 'display'
        ? `<p>\\[${expr}\\]</p>`
        : `\\(${expr}\\)`;
    });

    loading.style.display  = 'none';
    content.style.display  = 'block';
    content.innerHTML      = html;

    // Trigger MathJax typesetting after DOM is updated
    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise([content]);
    } else {
      // MathJax not loaded yet — wait for it
      window.addEventListener('load', () => {
        if (window.MathJax && MathJax.typesetPromise) {
          MathJax.typesetPromise([content]);
        }
      });
    }

  } catch (err) {
    loading.style.display  = 'none';
    errorDiv.style.display = 'block';
    errorDiv.innerHTML     = `Could not load <code>${file}</code>: ${err.message}`;
  }
})();
</script>
</body>
</html>
