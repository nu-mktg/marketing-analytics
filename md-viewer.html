<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Loading…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- MathJax MUST load before marked so config is set; async intentionally omitted -->
<script>
window.MathJax = {
  tex: {
    inlineMath:  [['\\(', '\\)']],
    displayMath: [['\\[', '\\]']],
    processEscapes: false
  },
  options: {
    skipHtmlTags: ['script','noscript','style','textarea','pre','code']
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root {
  --ink:    #1a1a1a;
  --ink2:   #444;
  --ink3:   #888;
  --paper:  #fafaf7;
  --rule:   #e0ddd6;
  --accent: #c0392b;
  --mono-bg:#f0ede8;
  --code-bg:#f5f2ee;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-weight: 300;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}
.topbar {
  background: var(--ink);
  color: white;
  padding: 0.65rem 2rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  font-size: 0.78rem;
  font-family: 'IBM Plex Mono', monospace;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar a { color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.12s; }
.topbar a:hover { color: white; }
.topbar .sep { color: rgba(255,255,255,0.2); }
#filename { color: rgba(255,255,255,0.85); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.page { max-width: 740px; margin: 0 auto; padding: 3rem 2rem 6rem; }

#loading { text-align: center; padding: 4rem 0; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--ink3); }
#error   { display: none; text-align: center; padding: 4rem 0; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--accent); }
#content { display: none; }

/* ── Rendered markdown ── */
#content h1 {
  font-family: 'Lora', Georgia, serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 600; line-height: 1.15; letter-spacing: -0.02em;
  margin-bottom: 0.5rem; padding-bottom: 0.75rem;
  border-bottom: 2px solid var(--ink);
}
#content h2 {
  font-family: 'Lora', Georgia, serif;
  font-size: 1.35rem; font-weight: 600;
  margin-top: 2.5rem; margin-bottom: 0.75rem;
  padding-bottom: 0.3rem; border-bottom: 1px solid var(--rule);
}
#content h3 { font-size: 1rem; font-weight: 500; margin-top: 2rem; margin-bottom: 0.5rem; }
#content h4 {
  font-size: 0.875rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink3); margin-top: 1.5rem; margin-bottom: 0.4rem;
}
#content p { margin-bottom: 1rem; }
#content strong { font-weight: 500; }
#content em { font-family: 'Lora', serif; font-style: italic; }
#content a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
#content a:hover { opacity: 0.75; }
#content ul, #content ol { margin: 0.5rem 0 1rem 1.5rem; }
#content li { margin-bottom: 0.3rem; }
#content code {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.84em;
  background: var(--mono-bg); padding: 0.1em 0.4em; border-radius: 2px;
}
#content pre {
  background: var(--code-bg); border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  padding: 1rem 1.2rem; overflow-x: auto;
  margin: 1rem 0 1.5rem; border-radius: 0 2px 2px 0;
}
#content pre code { background: none; padding: 0; font-size: 0.83em; line-height: 1.55; }
#content blockquote {
  border-left: 3px solid var(--rule); padding-left: 1.2rem;
  color: var(--ink2); margin: 1rem 0;
}
#content table { width: 100%; border-collapse: collapse; margin: 1.2rem 0; font-size: 0.875rem; }
#content th {
  text-align: left; font-weight: 500;
  border-bottom: 2px solid var(--ink);
  padding: 0.4rem 0.8rem 0.4rem 0;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink3);
}
#content td { padding: 0.45rem 0.8rem 0.45rem 0; border-bottom: 1px solid var(--rule); vertical-align: top; }
#content tr:last-child td { border-bottom: none; }
#content hr { border: none; border-top: 1px solid var(--rule); margin: 2.5rem 0; }

/* Math spacing */
mjx-container { overflow-x: auto; }
mjx-container[display="true"] { margin: 1.2rem 0 !important; }
</style>
</head>
<body>

<div class="topbar">
  <a id="back-link" href="index.html">← Back</a>
  <span class="sep">|</span>
  <span id="filename">Loading…</span>
</div>

<div class="page">
  <div id="loading">Loading…</div>
  <div id="error"></div>
  <div id="content"></div>
</div>

<script>
(async () => {
  const params     = new URLSearchParams(window.location.search);
  const file       = params.get('file');
  // Resolve back link: ?back= lets the instructor portal set its own return URL
  const back = params.get('back') || 'index.html';
  document.getElementById('back-link').href = back;
  const loading    = document.getElementById('loading');
  const errorDiv   = document.getElementById('error');
  const content    = document.getElementById('content');
  const filenameEl = document.getElementById('filename');

  if (!file) {
    loading.style.display = 'none';
    errorDiv.style.display = 'block';
    errorDiv.textContent = 'No file specified. Add ?file=path/to/file.md to the URL.';
    return;
  }

  filenameEl.textContent = file.split('/').pop();
  document.title = file.split('/').pop().replace('.md', '');

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — file not found`);
    const md = await resp.text();

    // ── Step 1: extract math blocks BEFORE marked touches them ──
    // marked will escape backslashes inside code spans etc., which breaks LaTeX.
    // We replace every math region with a placeholder, run marked, then restore.
    //
    // Dollar-sign protection strategy:
    //   a) \$ (escaped dollar, currency) → placeholder, then restore as literal $
    //   b) $N (dollar followed by digit, currency) → placeholder, restore as $N
    //   c) $$...$$ and $...$ (actual LaTeX) → converted to MathJax delimiters
    const stash = [];
    const tag   = (i) => `\x00MATH${i}\x00`;  // null-byte delimited — safe from markdown

    // First, protect escaped currency: \$ → placeholder
    const escapedDollar = '\x00ESDOLLAR\x00';
    let safe = md.replace(/\\\$/g, escapedDollar);

    // Also protect bare $N patterns (currency like $18, $3.5B, $100k)
    // These are $ followed by a digit — not valid LaTeX math starts in this context.
    // We only replace the $ sign itself; the digits remain in place.
    safe = safe.replace(/\$(?=\d)/g, '\x00DOLLAR\x00');

    safe = safe
      // Display math: $$...$$ (multiline)
      .replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
        stash.push(`\\[${tex}\\]`);
        return tag(stash.length - 1);
      })
      // Inline math: $...$ (single line, not preceded by another $)
      .replace(/(?<!\$)\$(?!\$)([^\n$]+?)\$/g, (_, tex) => {
        stash.push(`\\(${tex}\\)`);
        return tag(stash.length - 1);
      });

    // ── Step 2: configure marked with URL auto-linking ──
    marked.use({
      gfm: true,
      breaks: false,
      mangle: false,
      headerIds: true
    });

    // ── Step 3: parse markdown ──
    let html = marked.parse(safe);

    // ── Step 4: restore math placeholders and currency tokens ──
    html = html.replace(/\x00MATH(\d+)\x00/g, (_, i) => stash[parseInt(i)]);
    html = html.replace(/\x00DOLLAR\x00/g, '$');
    html = html.replace(/\x00ESDOLLAR\x00/g, '$');

    // ── Step 5: render ──
    loading.style.display = 'none';
    content.style.display = 'block';
    content.innerHTML     = html;

    // ── Step 6: typeset math ──
    // MathJax may or may not be ready yet — use promise if available, else poll
    const typeset = () => {
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([content]).catch(console.error);
      }
    };

    if (window.MathJax && MathJax.typesetPromise) {
      typeset();
    } else {
      // Poll until MathJax is ready (it loads synchronously but startup is async)
      const poll = setInterval(() => {
        if (window.MathJax && MathJax.typesetPromise) {
          clearInterval(poll);
          typeset();
        }
      }, 100);
    }

  } catch (err) {
    loading.style.display  = 'none';
    errorDiv.style.display = 'block';
    errorDiv.innerHTML     = `Could not load <code>${file}</code>: ${err.message}`;
  }
})();
</script>
</body>
</html>
